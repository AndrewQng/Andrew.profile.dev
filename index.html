    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        shine: {
                            '0%': { backgroundPosition: '0% 50%' },
                            '100%': { backgroundPosition: '200% 50%' },
                        }
                    },
                    animation: {
                        shine: 'shine 3s linear infinite reverse',
                    }
                }
            }
        }
    </script>
    <style>
        @media (pointer: fine) {
            * {
                cursor: none !important;
            }
        }

        .arcade-effect {
            font-family: 'Press Start 2P', cursive;
            color: #fef08a; /* Đổi sang màu vàng nhạt */
            text-shadow:
                0 0 0px rgba(254, 240, 138, 0),
                0 0 0px rgba(254, 240, 138, 0),
                0 0 0px rgba(254, 240, 138, 0),
                0 0 0px rgba(254, 240, 138, 0),
                3px 3px 0px #d946ef,
                6px 6px 0px #a855f7,
                9px 9px 0px #06b6d4,
                12px 12px 20px rgba(0,0,0,0.8);
        }

        #weapon-scythe {
            opacity: 0;
            transform-origin: 85% 85%;
            transform: translate(-40px, 110px) rotate(-30deg) scale(1.2);
            filter: blur(10px);
            will-change: transform, opacity, filter;
        }

        @keyframes scythe-slash {
            0% {
                opacity: 0;
                transform: translate(-40px, 110px) rotate(-30deg) scale(1.2);
                filter: blur(10px);
            }
            25% {
                opacity: 1;
                transform: translate(-90px, 150px) rotate(10deg) scale(1.2);
                filter: blur(0px);
            }
            45% {
                opacity: 1;
                transform: translate(-120px, 160px) rotate(50deg) scale(1.2);
            }
            60% {
                opacity: 1;
                transform: translate(-130px, 165px) rotate(65deg) scale(1.2);
                filter: blur(0px);
            }
            100% {
                opacity: 0;
                transform: translate(-150px, 180px) rotate(90deg) scale(1.2);
                filter: blur(10px);
            }
        }

        .animate-scythe-slash {
            animation: scythe-slash 1.5s ease-in-out forwards;
        }

        @keyframes slash-trail-anim {
            0% { opacity: 0; transform: translate(0px, 0px) rotate(0deg) scaleX(0); }
            20% { opacity: 1; transform: translate(0px, 0px) rotate(0deg) scaleX(0.6); }
            100% { opacity: 0; transform: translate(0px, 0px) rotate(0deg) scaleX(1) scaleY(4); filter: blur(6px); }
        }

        .animate-slash-trail {
            animation: slash-trail-anim 0.7s ease-out forwards;
        }

        @keyframes text-reveal-by-slash {
            from { 
                /* Cho phép dư ra 150px ở trên, dưới, trái. Bị cắt 100% ở bên phải để làm hiệu ứng quét */
                clip-path: inset(-150px 100% -150px -150px);
            }
            to { 
                /* Mở rộng không gian ra 150px ở tất cả các hướng để bóng sáng tỏa ra thoải mái */
                clip-path: inset(-150px -150px -150px -150px);
            }
        }

        @keyframes text-glow-spread {
            0% {
                text-shadow:
                    0 0 0px rgba(254, 240, 138, 0),
                    0 0 0px rgba(254, 240, 138, 0),
                    0 0 0px rgba(254, 240, 138, 0),
                    0 0 0px rgba(254, 240, 138, 0),
                    3px 3px 0px #d946ef,
                    6px 6px 0px #a855f7,
                    9px 9px 0px #06b6d4,
                    12px 12px 20px rgba(0,0,0,0.8);
            }
            100% {
                text-shadow:
                    0 0 15px rgba(254, 240, 138, 0.8),
                    0 0 30px rgba(254, 240, 138, 0.6),
                    0 0 50px rgba(254, 240, 138, 0.4),
                    0 0 80px rgba(254, 240, 138, 0.2),
                    3px 3px 0px #d946ef,
                    6px 6px 0px #a855f7,
                    9px 9px 0px #06b6d4,
                    12px 12px 20px rgba(0,0,0,0.8);
            }
        }

        .animate-text-reveal {
            opacity: 1;
            /* Hiện ra nhanh trong 0.4s, sau đó đợi thêm 0.6s (tổng 1s) rồi từ từ sáng loang ra trong 2.5s */
            animation: text-reveal-by-slash 0.4s ease-out forwards, text-glow-spread 2.5s ease-in-out 0.6s forwards;
        }

        @media (max-height: 768px) {
            #main-panel { zoom: 0.85; }
        }
        @media (max-height: 640px) {
            #main-panel { zoom: 0.7; }
        }
        @media (max-height: 450px) {
            #main-panel { zoom: 0.55; }
            #spotify-widget {
                zoom: 0.65;
                bottom: 8px !important;
                right: 8px !important;
                left: auto !important;
            }
        }
    </style>
